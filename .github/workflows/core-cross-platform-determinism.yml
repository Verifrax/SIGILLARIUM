name: Core Cross-Platform Determinism

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  core-determinism:
    name: core-hash (${ { matrix.os } })
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build core
        run: npm run build -w @sigillarium/core

      - name: Hash dist
        shell: bash
        run: |
          set -euo pipefail
          cd packages/core
          find dist -type f -print0 | LC_ALL=C sort -z | xargs -0 shasum -a 256 > dist.sha256

      - name: Upload dist hash
        uses: actions/upload-artifact@v4
        with:
          name: core-dist-sha256-${{ matrix.os }}
          path: packages/core/dist.sha256

  compare:
    name: compare-hashes
    needs: [core-determinism]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compare
        shell: bash
        run: |
          set -euo pipefail
          ls -R artifacts
          a="artifacts/core-dist-sha256-ubuntu-latest/dist.sha256"
          b="artifacts/core-dist-sha256-macos-latest/dist.sha256"
          c="artifacts/core-dist-sha256-windows-latest/dist.sha256"
          diff -u "$a" "$b"
          diff -u "$a" "$c"
